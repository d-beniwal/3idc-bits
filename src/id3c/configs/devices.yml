apstools.devices.motor_factory.mb_creator:
- name: sample_stage
  labels: [ "baseline" ]
  prefix: ""
  class_name: SampleStage
  motors:
    x: "3idxps1:m4"  # translation
    y: "3idc:m42"    # translation (vertical)
    z: "3idxps1:m3"  # translation (beam direction)
    omega: "3idxps1:m5"  # rotation around vertical
- name: detector_stage
  labels: [ "baseline" ]
  prefix: ""
  class_name: DetectorStage
  motors:
    x: "3idc:m43"  # translation
    y: "3idc:m35"  # translation Eiger2
    z: "3idc:m36"  # translation Eiger2
- name: laser_optics
  labels: [ "baseline" ]
  prefix: "3idxps1:"
  class_name: LaserOptics
  motors:
    us: m1
    ds: m2

apsbits.utils.sim_creator.predefined_device:
- { creator: ophyd.sim.motor, name: sim_motor }
- { creator: ophyd.sim.noisy_det, name: sim_det }

