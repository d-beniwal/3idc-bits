name: Documentation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # allow manual triggering

defaults:
  run:
    shell: bash -l {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # needed for gh-pages deploy

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    # This workflow is advisory in the sense that no branch protection
    # rule requires it to pass before merging.  A red build is visible
    # on the PR but does not block; a green build triggers deployment
    # on main (see the 'deploy' job).

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package with [doc] extras
        run: |
          set -vxeuo pipefail
          python -m pip install --upgrade pip
          pip install -e .[doc]

      - name: Build HTML
        run: |
          set -vxeuo pipefail
          cd docs
          make html
          ls -la build/html/index.html

      - name: Set up Node.js (for Marp CLI)
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Marp CLI
        run: |
          set -vxeuo pipefail
          npm install -g @marp-team/marp-cli
          marp --version

      - name: Render Marp slide decks (HTML + PDF)
        # Output goes into the Sphinx HTML output tree so the decks
        # are deployed alongside the rest of the docs under
        # gh-pages/presentations/.  The presentations/index.md
        # Sphinx page links to these URLs.
        #
        # PDF rendering uses Marp's bundled Chromium-via-Puppeteer
        # path.  If it fails on a given runner, the HTML is still
        # built; we just won't have a PDF on that build.
        run: |
          set -vxeo pipefail
          mkdir -p docs/build/html/presentations
          for src in docs/source/presentations/intro_*.md; do
            name=$(basename "$src" .md)
            echo "Rendering $name (HTML)..."
            marp --html=true "$src" \
              -o "docs/build/html/presentations/${name}.html"
            echo "Rendering $name (PDF)..."
            marp --pdf --allow-local-files "$src" \
              -o "docs/build/html/presentations/${name}.pdf" \
              || echo "WARNING: PDF render failed for $name (HTML is still built)"
          done
          ls -la docs/build/html/presentations/

      - name: Upload built docs as artifact
        uses: actions/upload-artifact@v7
        with:
          name: html-docs
          path: docs/build/html
          retention-days: 7

  deploy:
    name: Deploy to gh-pages
    runs-on: ubuntu-latest
    needs: build
    # Only deploy from main; do not deploy PR previews.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download built docs artifact
        uses: actions/download-artifact@v4
        with:
          name: html-docs
          path: html

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./html
          # First push creates gh-pages; subsequent pushes update it.
          # force_orphan keeps the gh-pages branch history shallow
          # (each deploy replaces the previous content rather than
          # accumulating commits).
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "deploy docs from ${{ github.sha }}"
